title: "Shayan Jannati Portfolio"
email: shayanjannati71@gmail.com
description: >-
  A portfolio showcasing my work in medical device design, microfabrication,
  image and data analysis, and simulation — highlighting projects at the
  intersection of mechanical engineering, biomedical research, and innovation.

twitter_username: shayanjannati
github_username: ShayanJannati71
minimal_mistakes_skin: default
search: true

markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes"
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name: "Shayan Jannati"
  avatar: "/assets/images/Portfolio_Picture.jpeg"
  bio: "Ph.D. in Mechanical Engineering (UBC)"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ShayanJannati71"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/shayan-jannati-172581b2"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ShayanJannati71/"

collections:
  portfolio:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: false
      share: false
      comments: false

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

kramdown:
  math_engine: mathjax

sass:
  style: compressed
